<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>루틴 브라우징</title>
    <meta name="description" content="매일 들러보는 사이트를 한 화면에서 열고 오늘 방문을 체크하는 개인용 대시보드" />
    <meta name="theme-color" content="#0f1115" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f6f7fb" media="(prefers-color-scheme: light)" />
    <meta name="color-scheme" content="dark light" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="루틴" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="appbar">
      <div class="appbar__inner">
        <div class="appbar__title">
          <h1>루틴 브라우징</h1>
          <p id="today-label" class="appbar__date"></p>
        </div>
        <div class="appbar__actions">
          <button id="btn-import" type="button" class="icon-btn" aria-label="가져오기" title="가져오기">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button id="btn-export" type="button" class="icon-btn" aria-label="내보내기" title="내보내기">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21V9m0 0l-4 4m4-4l4 4M5 3h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <input id="import-file" type="file" accept="application/json" hidden />
        </div>
      </div>
      <div class="appbar__progress">
        <div class="progress">
          <div id="progress-bar" class="progress__bar"></div>
        </div>
        <span id="progress-label" class="progress__label">0 / 0</span>
      </div>
    </header>

    <aside id="install-banner" class="install-banner" hidden>
      <div class="install-banner__text">홈 화면에 추가해 앱처럼 쓰기</div>
      <div class="install-banner__actions">
        <button id="btn-install-dismiss" type="button" class="btn">닫기</button>
        <button id="btn-install" type="button" class="btn btn--primary">설치</button>
      </div>
    </aside>

    <main id="dashboard" class="dashboard"></main>

    <button id="btn-add" type="button" class="fab" aria-label="사이트 추가" title="사이트 추가">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
    </button>

    <template id="card-template">
      <article class="card" draggable="false">
        <label class="card__check">
          <input type="checkbox" class="card__checkbox" />
          <span class="card__checkmark" aria-hidden="true"></span>
        </label>
        <a class="card__link" target="_blank" rel="noopener noreferrer">
          <img class="card__icon" alt="" loading="lazy" />
          <div class="card__text">
            <div class="card__name"></div>
            <div class="card__host"></div>
          </div>
        </a>
        <div class="card__tools">
          <button type="button" class="tool" data-action="move-up" title="위로">↑</button>
          <button type="button" class="tool" data-action="move-down" title="아래로">↓</button>
          <button type="button" class="tool" data-action="edit" title="편집">✎</button>
          <button type="button" class="tool tool--danger" data-action="delete" title="삭제">🗑</button>
        </div>
      </article>
    </template>

    <dialog id="site-dialog" class="dialog">
      <form id="site-form" method="dialog" class="dialog__form">
        <h2 id="dialog-title">사이트 추가</h2>
        <label>
          <span>이름</span>
          <input name="name" type="text" required maxlength="60" autocomplete="off" />
        </label>
        <label>
          <span>URL</span>
          <input name="url" type="url" required placeholder="https://example.com" />
        </label>
        <label>
          <span>카테고리</span>
          <input name="category" type="text" required list="category-options" maxlength="30" autocomplete="off" />
          <datalist id="category-options"></datalist>
        </label>
        <label>
          <span>아이콘 URL (선택)</span>
          <input name="iconUrl" type="url" placeholder="비워두면 자동" />
        </label>
        <div class="dialog__actions">
          <button type="button" value="cancel" id="dialog-cancel" class="btn">취소</button>
          <button type="submit" class="btn btn--primary">저장</button>
        </div>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
